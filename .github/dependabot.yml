version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    ignore:
      # Pin major-version upgrades — review manually for MiniLM/baseline compatibility.
      - dependency-name: torch
        update-types: ["version-update:semver-major"]
      - dependency-name: sentence-transformers
        update-types: ["version-update:semver-major"]
      - dependency-name: spacy
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
